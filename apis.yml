aid: bolt-eu
url: https://raw.githubusercontent.com/api-evangelist/bolt-eu/refs/heads/main/apis.yml
name: Bolt
kind: company
description: Bolt (bolt.eu) is the Estonian mobility super-app operating ride-hailing,
  ride booking, scooter and e-bike rentals, car-sharing, and food and grocery delivery
  across 50+ countries in Europe and Africa. This is NOT Bolt the US checkout/payments
  company (bolt.com). Bolt does not offer a public ride-booking API - the company
  states it has no public or private APIs for ride-hailing, and business ride booking
  happens through the Ride Booker web tool and private travel-platform partnerships.
  Its documented developer surface at developer.bolt.eu is partner-gated and covers
  the delivery side of the platform - Food, Stores, and Delivery APIs for POS, menu,
  order, warehouse, and PIM integration - plus a fleet API whose credentials are
  issued in the Fleet Portal but whose endpoints are not publicly documented.
