aid: bolt-eu
name: Bolt
review:
  question: Does Bolt expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Bolt's documented developer surface
    (the Food, Stores, and Delivery partner APIs at developer.bolt.eu) is
    request/response REST over HTTPS plus outbound HTTP webhooks that Bolt
    POSTs to partner-hosted endpoints (sendNewOrder, sendCancelOrder,
    sendOrderUpdate, sendProviderStatus, sendCourierDetails,
    sendDeductionEvent, courierPickedUpOrder). Webhooks are plain HTTP
    callbacks, not a server-push transport on Bolt's own API - there is no
    WebSocket or SSE surface to model.
findings:
  summary: |
    Bolt (bolt.eu, the Estonian mobility super-app - not bolt.com, the US
    checkout company) does not publish a documented public WebSocket API.
    It does not publish a public ride-booking API at all: Bolt's own support
    article states "Unfortunately, we don't offer any public or private APIs
    at the moment" in answer to rider/ride-hailing API requests, and the
    Bolt for Business Ride Booker is a web interface, not an API. The real,
    documented developer surface lives at developer.bolt.eu and is limited
    to the delivery side of the platform: the Bolt Food API (restaurant POS
    integration), Bolt Stores API (grocery/retail warehouse and PIM
    integration), and the combined Bolt Delivery API, all served from
    https://node.bolt.eu/delivery-provider-pos as JSON-over-HTTPS POST
    endpoints with HMAC-SHA256 request signing (x-external-integrator-id +
    x-server-authorization-hmac-sha256 headers). Access is partner-gated -
    integrator IDs and signing secrets are issued by Bolt when a partner
    test account is created. Streaming/eventing is delivered exclusively as
    outbound HTTP webhooks from Bolt to partner-hosted endpoints. A fleet
    API exists behind the Bolt Fleet Portal (credentials generated under
    Settings > API), but its endpoints are not publicly documented, so
    nothing was modeled for it.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://node.bolt.eu/delivery-provider-pos
      documented: true
      note: All documented Food/Stores/Delivery operations are HTTPS POST (RPC-style paths under /genericClient and /pim/v1).
    - protocol: Webhook
      scheme: https
      documented: true
      note: Bolt POSTs order/courier/provider lifecycle events to partner-hosted endpoints, authenticated with Basic auth or a partner identity server issuing bearer tokens. HTTP callbacks, not WebSocket.
    - protocol: SFTP
      scheme: sftp
      documented: true
      note: Simplified warehouse/PIM catalog integration by uploading JSON or CSV files to Bolt's SFTP server. Out of scope for AsyncAPI.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint appears anywhere on developer.bolt.eu or in Bolt support documentation as of the review date.
