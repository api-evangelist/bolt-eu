sources:
  - url: https://developer.bolt.eu/
    type: Documentation
    note: Bolt developer portal (Redocly SPA) hosting the Food, Stores, Delivery, and Self Service docs.
  - url: https://developer.bolt.eu/food/main/
    type: APIReference
    note: BoltFoodAPI - 17 POST paths plus 6 outbound webhooks; server https://node.bolt.eu/delivery-provider-pos.
  - url: https://developer.bolt.eu/stores/main/
    type: APIReference
    note: BoltStoresAPI - 37 POST paths plus 6 outbound webhooks covering warehouse and PIM integration.
  - url: https://developer.bolt.eu/delivery/main/
    type: APIReference
    note: BoltDeliveryAPI - combined restaurant + grocery spec, 43 POST paths plus 5 outbound webhooks.
  - url: https://bolt.eu/en/support/articles/360017256060/
    type: Documentation
    note: Official statement on rider-facing APIs - "Unfortunately, we don't offer any public or private APIs at the moment."
  - url: https://bolt.eu/en/support/articles/40343/
    type: Documentation
    note: Ride Booker for Bolt Business is a web interface for booking rides, not an API.
  - url: https://fleets.bolt.eu/
    type: Portal
    note: Fleet Portal where fleet partners generate API credentials (Settings > API); endpoints not publicly documented.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on any documented Bolt API. Event
    delivery is exclusively outbound HTTP webhooks from Bolt to
    partner-hosted endpoints, which are already captured in the webhooks
    section of the OpenAPI documents in openapi/. No AsyncAPI document was
    created because there is no server-push transport (WebSocket or SSE) on
    Bolt's own API to model.
